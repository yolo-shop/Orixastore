<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOLO ORIXA | Jumia Nigeria Store</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        :root { --orange: #f68b1e; --bg: #f5f5f5; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Roboto, sans-serif; }
        body { background: var(--bg); color: #282828; }

        /* Jumia Header */
        .header { background: #fff; padding: 12px 5%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 24px; font-weight: bold; color: var(--orange); text-decoration: none; letter-spacing: 2px; }
        .search-box { flex-grow: 1; margin: 0 20px; display: flex; }
        .search-box input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px 0 0 4px; outline: none; }
        .search-box button { background: var(--orange); color: #fff; border: none; padding: 0 15px; border-radius: 0 4px 4px 0; font-weight: bold; }

        /* Main Container */
        .container { max-width: 1200px; margin: 20px auto; display: flex; gap: 15px; padding: 0 10px; }
        .sidebar { width: 220px; background: #fff; border-radius: 4px; padding: 10px 0; height: fit-content; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .sidebar-item { padding: 12px 20px; font-size: 13px; border-bottom: 1px solid #f1f1f1; cursor: pointer; }
        .sidebar-item:hover { color: var(--orange); background: #fdfaf7; }

        /* Grid */
        .content { flex-grow: 1; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .card { background: #fff; padding: 10px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; position: relative; }
        .card:hover { border: 1px solid var(--orange); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; background: #fafafa; }
        .p-name { font-size: 13px; margin-top: 10px; height: 32px; overflow: hidden; font-weight: 400; }
        .p-price { font-size: 18px; font-weight: bold; margin-top: 5px; color: #000; }

        /* Admin Section */
        .admin-section { display: none; background: #fff; padding: 20px; border-radius: 4px; margin-bottom: 20px; border-top: 5px solid var(--orange); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .admin-section h3 { margin-bottom: 10px; font-size: 16px; color: var(--orange); }
        .admin-section input, .admin-section textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .save-btn { background: var(--orange); color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; }

        /* Details Popup */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .m-box { background: #fff; padding: 20px; width: 90%; max-width: 450px; border-radius: 8px; position: relative; }
        .buy-now { background: var(--orange); color: #fff; display: block; text-align: center; padding: 15px; font-weight: bold; text-decoration: none; border-radius: 4px; margin-top: 20px; text-transform: uppercase; }
        
        .gear { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer; z-index: 1001; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        @media (max-width: 768px) { .sidebar { display: none; } .grid { grid-template-columns: 1fr 1fr; } }
    </style>
</head>
<body>

    <div class="header">
        <a href="#" class="logo">YOLO ORIXA</a>
        <div class="search-box">
            <input type="text" placeholder="Search for products...">
            <button>SEARCH</button>
        </div>
        <div style="font-size: 12px; font-weight: bold; cursor: pointer;">Account ▼</div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="sidebar-item">👕 Men's Fashion</div>
            <div class="sidebar-item">🧴 Fragrances</div>
            <div class="sidebar-item">🚚 Delivery Info</div>
            <div class="sidebar-item">⭐ Top Sellers</div>
        </div>

        <div class="content">
            <div id="adminPanel" class="admin-section">
                <h3>Admin: Add New Product</h3>
                <input type="text" id="imgUrl" placeholder="Paste Image Link (e.g. from ImgBB)">
                <input type="text" id="pName" placeholder="Product Name">
                <input type="text" id="pPrice" placeholder="Price (e.g. ₦25,000)">
                <textarea id="pDesc" placeholder="Product Description (e.g. 100% Cotton, XL available)"></textarea>
                <button class="save-btn" onclick="saveToFirebase()">PUBLISH TO STORE</button>
            </div>

            <div class="grid" id="productGrid">
                </div>
        </div>
    </div>

    <div id="pModal" class="modal">
        <div class="m-box">
            <span style="float:right; cursor:pointer; font-size:24px; font-weight:bold;" onclick="closeModal()">&times;</span>
            <img id="mImg" src="" style="width:100%; height:250px; object-fit:cover; border-radius:4px;">
            <h2 id="mName" style="margin-top:15px; font-size:20px;"></h2>
            <p id="mPrice" style="color:var(--orange); font-size:22px; font-weight:bold;"></p>
            <p id="mDesc" style="color:#666; margin-top:10px; font-size:14px; line-height:1.5;"></p>
            <a id="waLink" href="#" class="buy-now">ORDER VIA WHATSAPP</a>
        </div>
    </div>

    <button class="gear" onclick="toggleAdmin()">⚙️</button>

    <script>
        // YOUR FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDo9-3KLJnrEpM0OpR-WMRHiX-U0HbAFAo",
            authDomain: "orixa-store.firebaseapp.com",
            projectId: "orixa-store",
            storageBucket: "orixa-store.firebasestorage.app",
            messagingSenderId: "380037346480",
            appId: "1:380037346480:web:155f4b0e1362bdbc043775",
            measurementId: "G-HE0YPJS627"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function toggleAdmin() {
            const panel = document.getElementById('adminPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function saveToFirebase() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const desc = document.getElementById('pDesc').value;
            const img = document.getElementById('imgUrl').value;

            if(name && price && img) {
                db.ref('products').push().set({ name, price, desc, img })
                .then(() => {
                    alert("Product Published Successfully!");
                    document.getElementById('adminPanel').style.display = 'none';
                    // Clear inputs
                    document.getElementById('pName').value = '';
                    document.getElementById('pPrice').value = '';
                    document.getElementById('pDesc').value = '';
                    document.getElementById('imgUrl').value = '';
                })
                .catch((error) => {
                    alert("Error: Make sure your Firebase Rules are set to 'true'!");
                    console.error(error);
                });
            } else {
                alert("Please fill in Name, Price, and Image Link!");
            }
        }

        // Load Products Live
        db.ref('products').on('value', (snap) => {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = '';
            snap.forEach((child) => {
                const data = child.val();
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(data.img, data.name, data.price, data.desc);
                card.innerHTML = `<img src="${data.img}"><p class="p-name">${data.name}</p><p class="p-price">${data.price}</p>`;
                grid.appendChild(card);
            });
        });

        function openModal(img, name, price, desc) {
            document.getElementById('mImg').src = img;
            document.getElementById('mName').innerText = name;
            document.getElementById('mPrice').innerText = price;
            document.getElementById('mDesc').innerText = desc;
            document.getElementById('waLink').href = `https://wa.me/2347073264419?text=Hello%20Yolo%20Orixa,%20I%20want%20to%20order%20the%20${name}`;
            document.getElementById('pModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('pModal').style.display = 'none'; }
    </script>
</body>
</html>
